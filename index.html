<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rádio Online</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#000;color:#fff;padding-bottom:80px}
.header{background:#333;padding:15px;text-align:center;font-size:22px;font-weight:bold;color:#fff}
.section{padding:15px}
.section h2{font-size:18px;margin-bottom:12px;color:#fff}
.radio-card{background:#1a1a1a;border-radius:10px;display:flex;align-items:center;padding:10px;margin-bottom:8px;cursor:border;transition:0.2s}
.radio-card:hover{background:#252525}
.radio-card img{width:55px;height:55px;border-radius:8px;object-fit:cover}
.radio-info{margin-left:12px;flex:1}
.radio-name{font-size:16px;font-weight:bold}
.favorite-btn{font-size:22px;cursor:pointer;padding:5px}
.player{position:fixed;bottom:0;left:0;width:100%;background:#111;padding:10px;display:flex;align-items:center;border-top:2px solid #333}
.player img{width:45px;height:45px;border-radius:8px;object-fit:cover}
.player-info{margin-left:10px;flex:1}
.player-name{font-size:14px;color:#ccc}
.player-name span{font-weight:bold;color:#ff5722}
.play-btn{background:#ff5722;border:none;color:#fff;width:50px;height:50px;border-radius:50%;font-size:20px;cursor:pointer}
</style>
</head>
<body>
<div class="header">📻 Rádio Online</div>
<div class="section"><h2>⭐ Favoritas</h2><div id="favoriteList"></div></div>
<div class="section"><h2>🎵 Todas as Rádios</h2><div id="radioList"></div></div>
<div class="player"><img id="playerLogo" src=""><div class="player-info"><div class="player-name">🎧 Tocando agora:<br><span id="playerName">Nenhuma</span></div></div><button class="play-btn" onclick="togglePlay()">▶</button></div>
<audio id="audio"></audio>
<script>
// ========== CONFIGURE SUAS RÁDIOS AQUI ==========
const radios = [
{nome:"Rádio Difusora FM 96.9",logo:"https://via.placeholder.com/55?text=Difusora",url:"https://servidor.stream/difusora"},
{nome:"Rádio Tiradentes FM",logo:"https://via.placeholder.com/55?text=Tiradentes",url:"https://servidor.stream/tiradentes"},
{nome:"Rádio Norte Borba",logo:"https://via.placeholder.com/55?text=Norte",url:"https://servidor.stream/norte"}
];
// =================================================

let fav = JSON.parse(localStorage.getItem("fav")||"[]");
let audioElem = document.getElementById("audio");

function salvarFav(){localStorage.setItem("fav",JSON.stringify(fav));}

function render(){
let listaHtml="",favHtml="";
radios.forEach((r,i)=>{
let isFav=fav.includes(i);
listaHtml+=`<div class="radio-card" onclick="playRadio(${i})"><img src="${r.logo}" onerror="this.src='https://via.placeholder.com/55?text=Radio'"><div class="radio-info"><div class="radio-name">${r.nome}</div></div><div class="favorite-btn" onclick="event.stopPropagation();toggleFav(${i})">${isFav?"❤️":"🤍"}</div></div>`;
if(isFav) favHtml+=`<div class="radio-card" onclick="playRadio(${i})"><img src="${r.logo}" onerror="this.src='https://via.placeholder.com/55?text=Radio'"><div class="radio-info"><div class="radio-name">${r.nome}</div></div><div class="favorite-btn" onclick="event.stopPropagation();toggleFav(${i})">❤️</div></div>`;
});
document.getElementById("radioList").innerHTML=listaHtml;
document.getElementById("favoriteList").innerHTML=favHtml||"<div style='text-align:center;padding:20px;color:#666'>💔 Nenhuma rádio favorita ainda<br><small>Clique no 🤍 para adicionar</small></div>";
}

function toggleFav(i){
fav.includes(i)?fav=fav.filter(f=>f!==i):fav.push(i);
salvarFav();
render();
}

function playRadio(i){
let r=radios[i];
audioElem.src=r.url;
audioElem.play().catch(e=>console.log("Erro ao tocar"));
document.getElementById("playerLogo").src=r.logo;
document.getElementById("playerName").innerHTML=r.nome;
document.querySelector(".play-btn").innerHTML="⏸";
}

function togglePlay(){
if(!audioElem.src)return;
if(audioElem.paused){
audioElem.play();
document.querySelector(".play-btn").innerHTML="⏸";
}else{
audioElem.pause();
document.querySelector(".play-btn").innerHTML="▶";
}
}

audioElem.onplaying=()=>document.querySelector(".play-btn").innerHTML="⏸";
audioElem.onpause=()=>document.querySelector(".play-btn").innerHTML="▶";

render();
</script>
</body>
</html>
